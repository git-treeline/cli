version: 2

builds:
  - binary: git-treeline
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/git-treeline/cli/cmd.Version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: git-treeline
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/git-treeline/cli
    description: "Worktree environment manager — isolated ports, databases, and services across parallel development environments"
    license: MIT
    install: |
      bin.install "git-treeline"
      bin.install_symlink "git-treeline" => "gtl"

      generate_completions_from_executable(bin/"git-treeline", "completion")
      generate_completions_from_executable(bin/"git-treeline", "completion", base_name: "gtl")
    post_install: |
      # If the user previously installed the HTTPS router service, bounce it
      # so the launchd-managed process picks up the new gtl binary. The
      # --if-installed flag makes this a no-op for users who never ran
      # 'gtl serve install', so first-time brew installs stay quiet.
      system bin/"gtl", "serve", "restart", "--if-installed"
    caveats: |
      Get started:
        cd your-project && gtl install

      One command: config, hooks, ports, env, and optional HTTPS routing.
      Docs: https://git-treeline.dev/docs/getting-started/

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
