name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test (race)
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Build (all platforms)
        run: |
          go build ./...
          GOOS=linux go build ./...

      - name: Smoke test the binary
        run: |
          go build -o /tmp/gtl .
          /tmp/gtl version
          /tmp/gtl --help >/dev/null
          /tmp/gtl status --json >/dev/null
          /tmp/gtl completion bash >/dev/null

  ci-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Full suite on the primary platform (launchd, pfctl, keychain, /etc/hosts).
      - name: Test (race)
        run: go test -race ./...

      - name: Build
        run: go build ./...
