name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify python3 is available
        run: python3 --version

      - name: Run end-to-end lifecycle test
        run: make test-e2e
